<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assign Homework | Inspired Homework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui']
          },
          colors: {
            ink: '#111827',
            slate: '#6B7280',
            canvas: '#F8FAFC',
            panel: '#FFFFFF',
            line: '#E5E7EB'
          }
        }
      }
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-canvas text-ink antialiased font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const students = ['Ava Brown', 'Maya Chen', 'Noah Patel', 'Leo Adams'];

    const lessons = [
      { id: 1, title: 'Fractions: Equivalent values', format: 'Interactive', duration: '12 min' },
      { id: 2, title: 'Ordering decimals', format: 'Video', duration: '9 min' },
      { id: 3, title: 'Word problems with percentages', format: 'Worksheet', duration: '15 min' },
      { id: 4, title: 'Ratio recap checkpoint', format: 'Quiz', duration: '10 min' }
    ];

    const stepMeta = [
      { title: 'Student' },
      { title: 'Homework' },
      { title: 'Schedule' },
      { title: 'Review' }
    ];

    function App() {
      const [step, setStep] = useState(1);
      const [selectedStudent, setSelectedStudent] = useState(students[0]);
      const [selectedLessonIds, setSelectedLessonIds] = useState([1]);
      const [dueDate, setDueDate] = useState('');
      const [notes, setNotes] = useState('Focus on showing working out.');
      const [showDetails, setShowDetails] = useState(false);
      const [assigned, setAssigned] = useState(false);

      const selectedLessons = useMemo(
        () => lessons.filter((item) => selectedLessonIds.includes(item.id)),
        [selectedLessonIds]
      );

      const canContinue =
        (step === 1 && selectedStudent) ||
        (step === 2 && selectedLessonIds.length > 0) ||
        (step === 3 && dueDate) ||
        step === 4;

      const toggleLesson = (id) => {
        setSelectedLessonIds((prev) =>
          prev.includes(id) ? prev.filter((lessonId) => lessonId !== id) : [...prev, id]
        );
      };

      const assignHomework = () => {
        setAssigned(true);
        setTimeout(() => setAssigned(false), 3500);
      };

      return (
        <main className="max-w-5xl mx-auto px-6 py-10">
          <header className="mb-8">
            <p className="text-sm text-slate font-medium">Inspired Homework</p>
            <h1 className="text-3xl font-semibold tracking-tight mt-1">Assign homework</h1>
            <p className="text-slate mt-2">A focused 4-step flow with only the essentials.</p>
          </header>

          <section className="bg-panel border border-line rounded-2xl p-6 md:p-8 shadow-sm">
            <ol className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
              {stepMeta.map((item, index) => {
                const stepNumber = index + 1;
                const active = step === stepNumber;
                const complete = step > stepNumber;
                return (
                  <button
                    key={item.title}
                    onClick={() => setStep(stepNumber)}
                    className={`text-left rounded-xl border p-3 transition ${
                      active
                        ? 'border-ink bg-gray-50'
                        : complete
                        ? 'border-gray-300 bg-white'
                        : 'border-line bg-white'
                    }`}
                  >
                    <div className="text-xs text-slate">Step {stepNumber}</div>
                    <div className="font-medium mt-1">{item.title}</div>
                  </button>
                );
              })}
            </ol>

            {step === 1 && (
              <section className="space-y-4">
                <h2 className="text-xl font-semibold">Choose a student</h2>
                <div className="grid sm:grid-cols-2 gap-3">
                  {students.map((student) => (
                    <button
                      key={student}
                      onClick={() => setSelectedStudent(student)}
                      className={`rounded-xl border p-4 text-left transition ${
                        selectedStudent === student
                          ? 'border-ink bg-gray-50'
                          : 'border-line hover:border-gray-400 bg-white'
                      }`}
                    >
                      <div className="font-medium">{student}</div>
                    </button>
                  ))}
                </div>
              </section>
            )}

            {step === 2 && (
              <section className="space-y-4">
                <h2 className="text-xl font-semibold">Select homework</h2>
                <p className="text-slate text-sm">Pick one or more activities.</p>
                <div className="space-y-3">
                  {lessons.map((lesson) => {
                    const checked = selectedLessonIds.includes(lesson.id);
                    return (
                      <label key={lesson.id} className={`block rounded-xl border p-4 cursor-pointer transition ${checked ? 'border-ink bg-gray-50' : 'border-line bg-white hover:border-gray-400'}`}>
                        <div className="flex items-start gap-3">
                          <input
                            type="checkbox"
                            checked={checked}
                            onChange={() => toggleLesson(lesson.id)}
                            className="mt-1 h-4 w-4"
                          />
                          <div>
                            <div className="font-medium">{lesson.title}</div>
                            <div className="text-sm text-slate mt-1">{lesson.format} · {lesson.duration}</div>
                          </div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              </section>
            )}

            {step === 3 && (
              <section className="space-y-4 max-w-xl">
                <h2 className="text-xl font-semibold">Set schedule</h2>
                <label className="block">
                  <span className="text-sm text-slate">Due date</span>
                  <input
                    type="date"
                    value={dueDate}
                    onChange={(e) => setDueDate(e.target.value)}
                    className="mt-1 w-full rounded-xl border border-line px-3 py-2"
                  />
                </label>
                <label className="block">
                  <span className="text-sm text-slate">Optional message</span>
                  <textarea
                    value={notes}
                    onChange={(e) => setNotes(e.target.value)}
                    rows="4"
                    className="mt-1 w-full rounded-xl border border-line px-3 py-2"
                    placeholder="Add a short note for the student"
                  />
                </label>
              </section>
            )}

            {step === 4 && (
              <section className="space-y-4">
                <h2 className="text-xl font-semibold">Review assignment</h2>
                <div className="rounded-xl border border-line bg-white p-4 space-y-3">
                  <p><span className="text-slate">Student:</span> <strong>{selectedStudent}</strong></p>
                  <p><span className="text-slate">Due:</span> <strong>{dueDate || 'Not selected'}</strong></p>
                  <div>
                    <p className="text-slate mb-2">Homework:</p>
                    <ul className="list-disc list-inside">
                      {selectedLessons.map((lesson) => <li key={lesson.id}>{lesson.title}</li>)}
                    </ul>
                  </div>
                  {notes && <p><span className="text-slate">Message:</span> {notes}</p>}
                </div>

                <button
                  onClick={() => setShowDetails((prev) => !prev)}
                  className="text-sm text-slate underline"
                >
                  {showDetails ? 'Hide extra details' : 'Show extra details'}
                </button>

                {showDetails && (
                  <div className="rounded-xl border border-line bg-gray-50 p-4 text-sm text-slate">
                    Advanced settings and analytics are intentionally hidden from the main flow to keep assignment creation fast and clear.
                  </div>
                )}
              </section>
            )}

            <footer className="mt-8 flex items-center justify-between gap-3 border-t border-line pt-6">
              <button
                onClick={() => setStep((s) => Math.max(1, s - 1))}
                className="px-4 py-2 rounded-xl border border-line bg-white disabled:opacity-40"
                disabled={step === 1}
              >
                Back
              </button>

              <div className="flex items-center gap-3">
                {step < 4 ? (
                  <button
                    onClick={() => setStep((s) => Math.min(4, s + 1))}
                    disabled={!canContinue}
                    className="px-4 py-2 rounded-xl bg-ink text-white disabled:opacity-40"
                  >
                    Continue
                  </button>
                ) : (
                  <button
                    onClick={assignHomework}
                    className="px-4 py-2 rounded-xl bg-ink text-white"
                  >
                    Assign homework
                  </button>
                )}
              </div>
            </footer>

            {assigned && (
              <div className="mt-5 rounded-xl border border-gray-300 bg-gray-50 p-3 text-sm">
                Homework assigned to <strong>{selectedStudent}</strong>.
              </div>
            )}
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
